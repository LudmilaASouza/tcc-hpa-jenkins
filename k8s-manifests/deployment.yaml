apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-teste-hpa
  namespace: tcc-jenkins
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-teste
  template:
    metadata:
      labels:
        app: app-teste
    spec:
      containers:
      - name: app
        image: nginx:latest
        resources:
          requests:
            cpu: "10m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        ports:
        - containerPort: 80
